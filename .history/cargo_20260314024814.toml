[package]
name = "api-scanner"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "api-scanner"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP
reqwest = { version = "0.12", features = ["json", "gzip", "deflate", "rustls-tls", "cookies", "stream"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# CLI
clap = { version = "4", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-appender = "0.2"

# Regex
regex = "1"
once_cell = "1"

# URL parsing
url = "2"

# Random
rand = "0.8"

# Async utilities
futures = "0.3"
tokio-util = { version = "0.7", features = ["full"] }

# Error handling
thiserror = "1"
anyhow = "1"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Concurrency primitives
dashmap = "5"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
