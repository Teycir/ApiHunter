name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --all-targets

      - name: Build
        run: cargo build --all-targets --locked

      - name: Package hygiene
        run: |
          set -euo pipefail
          PACKAGE_LIST="$(cargo package --list --allow-dirty)"
          if echo "$PACKAGE_LIST" | grep -En '(^|/)(\.codex|\.history|\.tmp|\.qodo|\.trunk|tasks|targets|tests|\.github)(/|$)'; then
            echo "Found local/dev-only paths in package payload."
            exit 1
          fi

      - name: Security audit (trusted events)
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Security audit (fork PR fallback)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          cargo install cargo-audit --locked
          cargo audit
