name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_zigbuild: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_zigbuild: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_zigbuild: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_zigbuild: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and upload
        id: upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: apihunter
          target: ${{ matrix.target }}
          archive: apihunter-${{ matrix.target }}
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
          use-zigbuild: ${{ matrix.use_zigbuild }}

      - name: Select release archive
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ steps.upload.outputs.tar }}" && -f "${{ steps.upload.outputs.tar }}" ]]; then
            echo "path=${{ steps.upload.outputs.tar }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ steps.upload.outputs.zip }}" && -f "${{ steps.upload.outputs.zip }}" ]]; then
            echo "path=${{ steps.upload.outputs.zip }}" >> "$GITHUB_OUTPUT"
          else
            echo "No release archive found for target ${{ matrix.target }}" >&2
            exit 1
          fi

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.archive.outputs.path }}

  harden_release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" --dir dist --pattern "apihunter-*"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release archives (keyless)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          signed=0
          for asset in dist/apihunter-*.tar.gz dist/apihunter-*.zip; do
            [[ -f "$asset" ]] || continue
            cosign sign-blob \
              --yes \
              --bundle "${asset}.sigstore.json" \
              --output-signature "${asset}.sig" \
              --output-certificate "${asset}.pem" \
              "$asset"
            signed=1
          done

          if [[ "$signed" -ne 1 ]]; then
            echo "No release archives found to sign." >&2
            exit 1
          fi

      - name: Upload signatures to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(
            dist/apihunter-*.tar.gz.sig
            dist/apihunter-*.tar.gz.pem
            dist/apihunter-*.tar.gz.sigstore.json
            dist/apihunter-*.zip.sig
            dist/apihunter-*.zip.pem
            dist/apihunter-*.zip.sigstore.json
          )
          if (( ${#files[@]} == 0 )); then
            echo "No signature files found to upload." >&2
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber

      - name: Generate release SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./dist
          format: spdx-json
          output-file: dist/apihunter-release-assets-sbom.spdx.json
          artifact-name: apihunter-release-assets-sbom.spdx.json
          upload-release-assets: true

      - name: Attest release SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/apihunter-*.tar.gz
            dist/apihunter-*.zip
          sbom-path: dist/apihunter-release-assets-sbom.spdx.json
