name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_zigbuild: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_zigbuild: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_zigbuild: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_zigbuild: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: apihunter
          target: ${{ matrix.target }}
          archive: apihunter-${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
          use-zigbuild: ${{ matrix.use_zigbuild }}
